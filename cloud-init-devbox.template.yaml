#cloud-config
timezone: America/Los_Angeles
package_update: true
package_upgrade: true

users:
  - name: __SERVER_USER__
    gecos: Devbox User
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    groups: [sudo]
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPwDGkyG3cNfQLY1UYYkxznFfUwkf51pNW1DfHyANAft

ssh_pwauth: false

write_files:
  - path: /etc/ssh/sshd_config.d/99-devbox.conf
    permissions: "0644"
    content: |
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      PubkeyAuthentication yes
      PermitRootLogin no
      X11Forwarding no
      AllowUsers __SERVER_USER__
  - path: /root/.devbox-tailscale-auth-key
    owner: root:root
    permissions: "0600"
    encoding: b64
    content: "__TAILSCALE_AUTH_KEY_B64__"
  - path: /usr/local/sbin/devbox-bootstrap.sh
    owner: root:root
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      set -euxo pipefail
      export DEBIAN_FRONTEND=noninteractive

      apt-get update
      apt-get install -y \
        ca-certificates \
        curl \
        gnupg \
        openssh-server \
        python3 \
        python3-apt \
        sudo \
        ufw

      install -m 0755 -d /usr/share/keyrings
      curl -fsSL https://pkgs.tailscale.com/stable/ubuntu/noble.noarmor.gpg -o /usr/share/keyrings/tailscale-archive-keyring.gpg
      curl -fsSL https://pkgs.tailscale.com/stable/ubuntu/noble.tailscale-keyring.list -o /etc/apt/sources.list.d/tailscale.list
      apt-get update
      apt-get install -y tailscale

      systemctl enable --now tailscaled
      if [ -s /root/.devbox-tailscale-auth-key ]; then
        set +e +x
        if tr -d '\r\n' < /root/.devbox-tailscale-auth-key | grep -q .; then
          tailscale up --auth-key file:/root/.devbox-tailscale-auth-key --ssh --hostname=__SERVER_NAME__ --operator=__SERVER_USER__
          tailscale_status=$?
        else
          tailscale_status=0
        fi
        rm -f /root/.devbox-tailscale-auth-key
        set -e -x
        if [ "$tailscale_status" -ne 0 ]; then
          exit "$tailscale_status"
        fi
      fi

      bootstrap_ssh_cidr="__BOOTSTRAP_SSH_CIDR__"
      public_web="__PUBLIC_WEB__"
      ufw default deny incoming
      ufw default allow outgoing
      ufw allow from "$bootstrap_ssh_cidr" to any port 22 proto tcp
      if [ "$public_web" = "1" ]; then
        ufw allow 80/tcp
        ufw allow 443/tcp
      else
        ufw --force delete allow 80/tcp || true
        ufw --force delete allow 443/tcp || true
      fi
      ufw allow in on tailscale0
      ufw --force enable

      systemctl restart ssh

      {
        date
        uname -a
        python3 --version
        tailscale version | head -n 1
        tailscale ip -4 || true
        ufw status verbose
      } > /etc/devbox-bootstrap.log
  - path: /usr/local/sbin/devbox-lockdown-public-ssh.sh
    owner: root:root
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      set -euxo pipefail

      bootstrap_ssh_cidr="__BOOTSTRAP_SSH_CIDR__"
      public_web="__PUBLIC_WEB__"
      ufw --force delete allow from "$bootstrap_ssh_cidr" to any port 22 proto tcp || true
      ufw --force delete allow 22/tcp || true
      if [ "$public_web" = "1" ]; then
        ufw allow 80/tcp
        ufw allow 443/tcp
      else
        ufw --force delete allow 80/tcp || true
        ufw --force delete allow 443/tcp || true
      fi
      ufw allow in on tailscale0
      ufw reload
      ufw status verbose

runcmd:
  - /usr/local/sbin/devbox-bootstrap.sh
