---
- name: Check whether mise is installed
  ansible.builtin.command: test -x /home/{{ devbox_user }}/.local/bin/mise
  register: devbox_mise_installed
  changed_when: false
  failed_when: false
  become: true
  become_user: "{{ devbox_user }}"

- name: Install mise
  ansible.builtin.shell: |
    set -euo pipefail
    curl -fsSL https://mise.run | sh
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ devbox_user }}"
  when: devbox_mise_installed.rc != 0

- name: Install mise-managed tools
  ansible.builtin.command: >
    /home/{{ devbox_user }}/.local/bin/mise use -g -y
    atuin@latest
    eza@latest
    delta@latest
    lazygit@latest
    yazi@latest
  become: true
  become_user: "{{ devbox_user }}"
  environment:
    MISE_YES: "1"
    PATH: "/home/{{ devbox_user }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"
  changed_when: false

- name: Ensure managed OpenCode configuration directory exists
  ansible.builtin.file:
    path: /etc/opencode
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Install managed OpenCode guardrail policy
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../assets/opencode/managed.json"
    dest: /etc/opencode/opencode.json
    owner: root
    group: root
    mode: "0644"

- name: Install AI npm globals and routers
  ansible.builtin.shell: |
    set -euo pipefail
    source "/home/{{ devbox_user }}/.local/share/dev-server/lib/common.sh"
    dev_server_home_dir="/home/{{ devbox_user }}"
    dev_server_assets_root="/home/{{ devbox_user }}/.local/share/dev-server/assets"
    source "/home/{{ devbox_user }}/.local/share/dev-server/lib/ai-tools.sh"
    ai_install
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ devbox_user }}"
  environment:
    PATH: "/home/{{ devbox_user }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"
  changed_when: false

- name: Verify managed AI tools
  ansible.builtin.shell: |
    set -euo pipefail
    source "/home/{{ devbox_user }}/.local/share/dev-server/lib/common.sh"
    dev_server_home_dir="/home/{{ devbox_user }}"
    dev_server_assets_root="/home/{{ devbox_user }}/.local/share/dev-server/assets"
    source "/home/{{ devbox_user }}/.local/share/dev-server/lib/doctor.sh"
    source "/home/{{ devbox_user }}/.local/share/dev-server/lib/ai-tools.sh"
    doctor_reset
    ai_doctor
    doctor_summary "ai-tools"
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ devbox_user }}"
  environment:
    PATH: "/home/{{ devbox_user }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"
  changed_when: false

- name: Generate server GitHub SSH key when absent
  ansible.builtin.command: ssh-keygen -t ed25519 -C '{{ devbox_user }}-dev-server-github' -f /home/{{ devbox_user }}/.ssh/id_ed25519_github -N ''
  args:
    creates: "/home/{{ devbox_user }}/.ssh/id_ed25519_github"
  become: true
  become_user: "{{ devbox_user }}"

- name: Ensure GitHub SSH config file exists
  ansible.builtin.copy:
    dest: "/home/{{ devbox_user }}/.ssh/config"
    content: ""
    force: false
    owner: "{{ devbox_user }}"
    group: "{{ devbox_user }}"
    mode: "0600"

- name: Install GitHub SSH config block
  ansible.builtin.blockinfile:
    path: "/home/{{ devbox_user }}/.ssh/config"
    owner: "{{ devbox_user }}"
    group: "{{ devbox_user }}"
    mode: "0600"
    marker: "# {mark} DEVBOX GITHUB SSH"
    block: |
      Host github.com
        HostName github.com
        User git
        IdentityFile ~/.ssh/id_ed25519_github
        IdentitiesOnly yes
        AddKeysToAgent no
        StrictHostKeyChecking accept-new
