---
- name: Ensure AI tool libexec directory exists
  ansible.builtin.file:
    path: "/home/{{ devbox_user }}/.local/libexec"
    state: directory
    owner: "{{ devbox_user }}"
    group: "{{ devbox_user }}"
    mode: "0755"

- name: Install Codex router
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../codex-router"
    dest: "/home/{{ devbox_user }}/.local/libexec/codex-router"
    owner: "{{ devbox_user }}"
    group: "{{ devbox_user }}"
    mode: "0755"

- name: Install Claude router
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../claude-router"
    dest: "/home/{{ devbox_user }}/.local/libexec/claude-router"
    owner: "{{ devbox_user }}"
    group: "{{ devbox_user }}"
    mode: "0755"

- name: Reject unsupported default Claude state
  ansible.builtin.shell: |
    set -euo pipefail
    path="/home/{{ devbox_user }}/.claude"
    if [[ -e "$path" || -L "$path" ]]; then
      printf '%s is unsupported; use .claude-personal or .claude-work\n' "$path"
      exit 1
    fi
  args:
    executable: /bin/bash
  changed_when: false

- name: Link Codex command shortcuts
  ansible.builtin.file:
    src: "/home/{{ devbox_user }}/.local/libexec/codex-router"
    dest: "/home/{{ devbox_user }}/bin/{{ item }}"
    owner: "{{ devbox_user }}"
    group: "{{ devbox_user }}"
    follow: false
    state: link
    force: true
  loop:
    - codex
    - codex-personal
    - codex-work

- name: Link Claude command shortcuts
  ansible.builtin.file:
    src: "/home/{{ devbox_user }}/.local/libexec/claude-router"
    dest: "/home/{{ devbox_user }}/bin/{{ item }}"
    owner: "{{ devbox_user }}"
    group: "{{ devbox_user }}"
    follow: false
    state: link
    force: true
  loop:
    - claude
    - claude-personal
    - claude-work

- name: Link Codex shortcuts into /usr/local/bin
  ansible.builtin.file:
    src: "/home/{{ devbox_user }}/bin/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    state: link
    force: true
  loop:
    - codex
    - codex-personal
    - codex-work

- name: Link Claude shortcuts into /usr/local/bin
  ansible.builtin.file:
    src: "/home/{{ devbox_user }}/bin/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    state: link
    force: true
  loop:
    - claude
    - claude-personal
    - claude-work

- name: Configure npm user prefix
  ansible.builtin.command: npm config set prefix /home/{{ devbox_user }}/.local
  become: true
  become_user: "{{ devbox_user }}"
  changed_when: false

- name: Check whether mise is installed
  ansible.builtin.command: test -x /home/{{ devbox_user }}/.local/bin/mise
  register: devbox_mise_installed
  changed_when: false
  failed_when: false
  become: true
  become_user: "{{ devbox_user }}"

- name: Install mise
  ansible.builtin.shell: |
    set -euo pipefail
    curl -fsSL https://mise.run | sh
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ devbox_user }}"
  when: devbox_mise_installed.rc != 0

- name: Install mise-managed tools
  ansible.builtin.command: >
    /home/{{ devbox_user }}/.local/bin/mise use -g -y
    atuin@latest
    eza@latest
    delta@latest
    lazygit@latest
    yazi@latest
  become: true
  become_user: "{{ devbox_user }}"
  environment:
    MISE_YES: "1"
    PATH: "/home/{{ devbox_user }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"
  changed_when: false

- name: Install AI npm globals
  ansible.builtin.command: >
    npm install -g
    @openai/codex
    @anthropic-ai/claude-code
  become: true
  become_user: "{{ devbox_user }}"
  environment:
    PATH: "/home/{{ devbox_user }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"
  changed_when: false

- name: Verify managed Codex router
  ansible.builtin.shell: |
    set -euo pipefail
    expected="/home/{{ devbox_user }}/.local/bin/codex"
    router="/home/{{ devbox_user }}/.local/libexec/codex-router"
    test -x "$expected"
    test -x "$router"
    for shortcut in \
      "/home/{{ devbox_user }}/bin/codex" \
      "/home/{{ devbox_user }}/bin/codex-personal" \
      "/home/{{ devbox_user }}/bin/codex-work"; do
      test -L "$shortcut"
      test "$(readlink "$shortcut")" = "$router"
      actual="$(CODEX_ROUTER_PRINT_BIN=1 "$shortcut")"
      test "$actual" = "$expected"
    done
    test "$(CODEX_ROUTER_PRINT_HOME=1 "/home/{{ devbox_user }}/bin/codex-personal")" = "/home/{{ devbox_user }}/.codex-personal"
    test "$(CODEX_ROUTER_PRINT_HOME=1 "/home/{{ devbox_user }}/bin/codex-work")" = "/home/{{ devbox_user }}/.codex-work"
    "/home/{{ devbox_user }}/bin/codex" --version
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ devbox_user }}"
  changed_when: false

- name: Verify managed Claude router
  ansible.builtin.shell: |
    set -euo pipefail
    expected="/home/{{ devbox_user }}/.local/bin/claude"
    router="/home/{{ devbox_user }}/.local/libexec/claude-router"
    test -x "$expected"
    test -x "$router"
    for shortcut in \
      "/home/{{ devbox_user }}/bin/claude" \
      "/home/{{ devbox_user }}/bin/claude-personal" \
      "/home/{{ devbox_user }}/bin/claude-work"; do
      test -L "$shortcut"
      test "$(readlink "$shortcut")" = "$router"
      actual="$(CLAUDE_ROUTER_PRINT_BIN=1 "$shortcut")"
      test "$actual" = "$expected"
    done
    test "$(CLAUDE_ROUTER_PRINT_HOME=1 "/home/{{ devbox_user }}/bin/claude-personal")" = "/home/{{ devbox_user }}/.claude-personal"
    test "$(CLAUDE_ROUTER_PRINT_HOME=1 "/home/{{ devbox_user }}/bin/claude-work")" = "/home/{{ devbox_user }}/.claude-work"
    "/home/{{ devbox_user }}/bin/claude" --version
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ devbox_user }}"
  changed_when: false

- name: Enable corepack shims
  ansible.builtin.command: corepack enable --install-directory /home/{{ devbox_user }}/.local/bin
  become: true
  become_user: "{{ devbox_user }}"
  environment:
    PATH: "/home/{{ devbox_user }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"
  changed_when: false

- name: Generate server GitHub SSH key when absent
  ansible.builtin.command: ssh-keygen -t ed25519 -C '{{ devbox_user }}-dev-server-github' -f /home/{{ devbox_user }}/.ssh/id_ed25519_github -N ''
  args:
    creates: "/home/{{ devbox_user }}/.ssh/id_ed25519_github"
  become: true
  become_user: "{{ devbox_user }}"

- name: Ensure GitHub SSH config file exists
  ansible.builtin.copy:
    dest: "/home/{{ devbox_user }}/.ssh/config"
    content: ""
    force: false
    owner: "{{ devbox_user }}"
    group: "{{ devbox_user }}"
    mode: "0600"

- name: Install GitHub SSH config block
  ansible.builtin.blockinfile:
    path: "/home/{{ devbox_user }}/.ssh/config"
    owner: "{{ devbox_user }}"
    group: "{{ devbox_user }}"
    mode: "0600"
    marker: "# {mark} DEVBOX GITHUB SSH"
    block: |
      Host github.com
        HostName github.com
        User git
        IdentityFile ~/.ssh/id_ed25519_github
        IdentitiesOnly yes
        AddKeysToAgent no
        StrictHostKeyChecking accept-new
