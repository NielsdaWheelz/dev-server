---
- name: Configure SSH daemon hardening
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/99-devbox.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      PubkeyAuthentication yes
      PermitRootLogin no
      X11Forwarding no
      AllowUsers {{ devbox_user }}
  notify: Validate and restart ssh

- name: Ensure UFW denies incoming by default
  ansible.builtin.command: ufw default deny incoming
  changed_when: false

- name: Ensure UFW allows outgoing by default
  ansible.builtin.command: ufw default allow outgoing
  changed_when: false

- name: Allow Tailscale interface ingress
  ansible.builtin.command: ufw allow in on tailscale0
  changed_when: "'Skipping' not in devbox_ufw_tailscale.stdout"
  register: devbox_ufw_tailscale

- name: Allow public HTTP when enabled
  ansible.builtin.command: ufw allow 80/tcp
  register: devbox_ufw_allow_http
  changed_when: "'Skipping' not in devbox_ufw_allow_http.stdout"
  when: devbox_public_web

- name: Allow public HTTPS when enabled
  ansible.builtin.command: ufw allow 443/tcp
  register: devbox_ufw_allow_https
  changed_when: "'Skipping' not in devbox_ufw_allow_https.stdout"
  when: devbox_public_web

- name: Enable UFW
  ansible.builtin.command: ufw --force enable
  changed_when: false

- name: Keep passwordless sudo for the single-user dev box
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/90-devbox-{{ devbox_user }}"
    owner: root
    group: root
    mode: "0440"
    validate: "visudo -cf %s"
    content: "{{ devbox_user }} ALL=(ALL) NOPASSWD:ALL\n"
