---
- name: Get devbox user uid
  ansible.builtin.command: "id -u {{ devbox_user }}"
  register: devbox_user_uid
  changed_when: false

- name: Ensure devbox user remains in sudo group
  ansible.builtin.user:
    name: "{{ devbox_user }}"
    groups: sudo
    append: true

- name: Inspect devbox user groups
  ansible.builtin.command: "id -nG {{ devbox_user }}"
  register: devbox_user_groups
  changed_when: false

- name: Disable rootful Docker socket
  ansible.builtin.systemd:
    name: docker.socket
    enabled: false
    state: stopped

- name: Disable rootful Docker service
  ansible.builtin.systemd:
    name: docker
    enabled: false
    state: stopped

- name: Disable rootful containerd service
  ansible.builtin.systemd:
    name: containerd
    enabled: false
    state: stopped

- name: Remove rootful Docker state
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /var/lib/docker
    - /var/lib/containerd

- name: Remove rootful Docker daemon config
  ansible.builtin.file:
    path: /etc/docker/daemon.json
    state: absent

- name: Remove user from rootful docker group
  ansible.builtin.command: "gpasswd --delete {{ devbox_user }} docker"
  changed_when: true
  when: "' docker ' in (' ' ~ devbox_user_groups.stdout ~ ' ')"

- name: Enable linger for rootless Docker user service
  ansible.builtin.command: "loginctl enable-linger {{ devbox_user }}"
  changed_when: false

- name: Start user systemd manager for rootless Docker
  ansible.builtin.systemd:
    name: "user@{{ devbox_user_uid.stdout }}.service"
    state: started

- name: Wait for user D-Bus socket
  ansible.builtin.wait_for:
    path: "/run/user/{{ devbox_user_uid.stdout }}/bus"
    state: present
    timeout: 30

- name: Install rootless Docker service
  ansible.builtin.command: dockerd-rootless-setuptool.sh install
  args:
    creates: "/home/{{ devbox_user }}/.config/systemd/user/docker.service"
  become: true
  become_user: "{{ devbox_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ devbox_user_uid.stdout }}"

- name: Ensure rootless Docker config directory exists
  ansible.builtin.file:
    path: "/home/{{ devbox_user }}/.config/docker"
    state: directory
    owner: "{{ devbox_user }}"
    group: "{{ devbox_user }}"
    mode: "0755"

- name: Configure rootless Docker log rotation
  ansible.builtin.copy:
    dest: "/home/{{ devbox_user }}/.config/docker/daemon.json"
    owner: "{{ devbox_user }}"
    group: "{{ devbox_user }}"
    mode: "0644"
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "{{ devbox_docker_log_max_size }}",
          "max-file": "{{ devbox_docker_log_max_file }}"
        }
      }
  register: devbox_rootless_docker_config

- name: Enable rootless Docker user service
  ansible.builtin.command: systemctl --user enable --now docker.service
  become: true
  become_user: "{{ devbox_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ devbox_user_uid.stdout }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ devbox_user_uid.stdout }}/bus"
  changed_when: false

- name: Restart rootless Docker when log policy changed
  ansible.builtin.command: systemctl --user restart docker.service
  become: true
  become_user: "{{ devbox_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ devbox_user_uid.stdout }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ devbox_user_uid.stdout }}/bus"
  changed_when: true
  when:
    - devbox_rootless_docker_config is defined
    - devbox_rootless_docker_config.changed

- name: Install rootless Docker shell environment
  ansible.builtin.copy:
    dest: "/home/{{ devbox_user }}/.config/devbox-docker-env"
    owner: "{{ devbox_user }}"
    group: "{{ devbox_user }}"
    mode: "0644"
    content: |
      export XDG_RUNTIME_DIR="${XDG_RUNTIME_DIR:-/run/user/{{ devbox_user_uid.stdout }}}"
      export DOCKER_HOST="${DOCKER_HOST:-unix:///run/user/{{ devbox_user_uid.stdout }}/docker.sock}"
